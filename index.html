<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FFFAF2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Recomp Studio+">
  <meta name="description" content="A personal body recomposition workout planner and tracker with RIR, exercise notes, calendar, activities, progress, and editable routines.">
  <link rel="manifest" href="./manifest.json?v=2.1">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./styles.css?v=2.1">
  <title>Recomp Studio+</title>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand-lockup">
        <div class="brand-mark" aria-hidden="true"></div>
        <div>
          <p class="eyebrow">RECOMP · STRENGTH · WELLNESS</p>
          <h1 id="page-title">Today</h1>
        </div>
      </div>
      <button id="travel-pill" class="travel-pill" type="button" aria-label="Toggle travel mode">
        <span>✦</span> Travel
      </button>
    </header>

    <main id="main-content" class="main-content" aria-live="polite"></main>

    <aside id="timer-panel" class="timer-panel hidden" aria-live="assertive">
      <div class="timer-copy">
        <p class="timer-label">REST BREAK</p>
        <strong id="timer-value">01:30</strong>
      </div>
      <div class="timer-actions">
        <button id="timer-pause" type="button">Pause</button>
        <button id="timer-subtract" type="button">−15</button>
        <button id="timer-add" type="button">+15</button>
        <button id="timer-skip" type="button">Skip</button>
      </div>
    </aside>

    <nav class="bottom-nav" aria-label="Main navigation">
      <button class="nav-item active" data-view="today" type="button">
        <span class="nav-icon">♡</span><span>Today</span>
      </button>
      <button class="nav-item" data-view="routines" type="button">
        <span class="nav-icon routine-nav-icon">🏋️</span><span>Routines</span>
      </button>
      <button class="nav-item" data-view="calendar" type="button">
        <span class="nav-icon">▦</span><span>Calendar</span>
      </button>
      <button class="nav-item" data-view="coach" type="button">
        <span class="nav-icon">✦</span><span>Coach</span>
      </button>
      <button class="nav-item" data-view="history" type="button">
        <span class="nav-icon">↗</span><span>Progress</span>
      </button>
      <button class="nav-item" data-view="settings" type="button">
        <span class="nav-icon">⚙</span><span>Settings</span>
      </button>
    </nav>
  </div>

  <input id="import-input" type="file" accept="application/json" hidden>
  <div id="modal-root"></div>


  <script>
    (function () {
      function showStartupError() {
        if (window.__RECOMP_APP_READY__) return;
        var main = document.getElementById("main-content");
        if (!main) return;

        main.innerHTML =
          '<section style="margin:20px 0;padding:20px;border:1px solid #DCD4C1;border-radius:24px;background:#fff;color:#555548;">' +
            '<p style="margin:0 0 5px;font-size:11px;letter-spacing:.08em;color:#818263;font-weight:700;">APP RECOVERY</p>' +
            '<h2 style="margin:0 0 10px;color:#818263;font-family:Georgia,serif;font-style:italic;">The app could not finish loading</h2>' +
            '<p style="line-height:1.5;">Reload once after uploading the fixed files. If the page remains blank, reset only this app’s local data below.</p>' +
            '<button id="recomp-reload" style="width:100%;min-height:48px;margin-top:8px;border:0;border-radius:15px;background:#818263;color:white;font-weight:700;">Reload app</button>' +
            '<button id="recomp-reset" style="width:100%;min-height:48px;margin-top:8px;border:1px solid #DDBAAE;border-radius:15px;background:#FFFAF2;color:#7d665f;font-weight:700;">Reset this app’s saved data</button>' +
          '</section>';

        document.getElementById("recomp-reload").onclick = function () {
          location.reload();
        };

        document.getElementById("recomp-reset").onclick = function () {
          if (!confirm("Delete the saved data for Recomp Studio+ on this device?")) return;
          localStorage.removeItem("recomp-studio-plus-v1");
          location.reload();
        };
      }

      window.addEventListener("error", function () {
        setTimeout(showStartupError, 0);
      });

      window.addEventListener("unhandledrejection", function () {
        setTimeout(showStartupError, 0);
      });

      window.addEventListener("load", function () {
        setTimeout(showStartupError, 1200);
      });
    })();
  </script>

  <script src="./exercise-database.js?v=2.1"></script>
  <script src="./routine-data.js?v=2.1"></script>
  <script src="./app.js?v=2.1"></script>
</body>
</html>
